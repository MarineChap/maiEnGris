        <h2>Hommage à Dominique Chaput de Taluyers</h2>
        <p>
          Dominique Chaput, coureur de trail de Taluyers, a été emporté par un glioblastome.
          Pour lui rendre hommage, rejoignez le défi solidaire <strong>Mai en Gris</strong> :
          courons ensemble tout le mois de mai pour financer la recherche contre le cancer du cerveau.
        </p>
        <p>
          Que vous marchiez 2 km ou couriez un marathon, chaque kilomètre s'ajoute au compteur collectif.
          Votre don finance directement les chercheurs qui travaillent chaque jour pour offrir un futur aux malades.
        </p>
        <p>
          Organisé au profit de l'association <strong>Des Étoiles Dans La Mer</strong>.
